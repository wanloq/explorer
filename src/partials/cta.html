<section id="contact" class="relative isolate overflow-hidden py-28 text-center text-cream-100">
  <img src="https://images.unsplash.com/photo-1560518883-ce09059eeffa?auto=format&fit=crop&w=1800&q=70" alt="Landscaped gated estate entrance at dusk" class="absolute inset-0 -z-20 h-full w-full object-cover" loading="lazy" />
  <div class="absolute inset-0 -z-10 bg-forest-900/80"></div>

  <div class="section-container reveal">
    <p class="eyebrow justify-center"><span class="h-px w-8 bg-gold-400"></span> Start Today</p>
    <h2 class="mx-auto mt-4 max-w-2xl font-display text-4xl font-semibold sm:text-6xl">Find Your Perfect Land Faster</h2>
    <p class="mx-auto mt-5 max-w-lg text-sm leading-relaxed text-cream-100/80 sm:text-base">
      Tell us your budget and preferred location, and one of our advisors will match you with the right
      estate — in Lagos, Ogun State or beyond.
    </p>
    <form class="mx-auto mt-9 flex max-w-md flex-col gap-3 sm:flex-row" action="#" method="post">
      <label for="cta-phone" class="sr-only">WhatsApp or phone number</label>
      <input id="cta-phone" name="phone" type="tel" required placeholder="Your WhatsApp / phone number"
        class="w-full rounded-full border border-cream-100/30 bg-cream-100/10 px-5 py-3.5 text-sm text-cream-100 placeholder:text-cream-100/60 focus:border-gold-400 focus:outline-none" />
      <button type="submit" class="btn-gold whitespace-nowrap">Get Started</button>
    </form>
  </div>
</section>
